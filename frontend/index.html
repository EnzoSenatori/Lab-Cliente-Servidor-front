<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Livraria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="app-header">
    <div class="container">
        <div class="brand">
            <span class="logo-dot" aria-hidden="true"></span>
            <h1>Livraria</h1>
        </div>
        <p class="subtitle">Busque, consulte e reserve livros</p>
    </div>
</header>

<main class="container">
    <section class="search-bar">
        <input type="text" id="buscaInput" placeholder="Buscar por título, autor ou editora" aria-label="Termo de busca">
        <button type="button" class="btn btn-primary" onclick="buscarLivros()">Buscar</button>
    </section>

    <section id="resultados" class="grid" aria-label="Resultados da busca"></section>
    <section id="detalhes" aria-label="Detalhes do livro"></section>
    <section id="reserva" aria-label="Reserva"></section>
</main>

<script src="app.js"></script>
</body>
</html>
